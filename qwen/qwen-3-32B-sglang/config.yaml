model_metadata:
  example_model_input: # Loads sample request into Baseten playground
    messages:
      - role: system
        content: "You are a helpful assistant."
      - role: user
        content: "What does Tongyi Qianwen mean?"
    stream: true
    model: "Qwen/Qwen3-32B"
    max_tokens: 32768
    temperature: 0.6
  tags:
    - openai-compatible
model_name: Qwen 3 32B SGLang
base_image:
  image: lmsysorg/sglang:v0.4.6.post1-cu124
weights:
  - source: "hf://Qwen/Qwen3-32B-FP8@37f3f67a7a82b002377985796c57f4321b85fb9a"
    mount_location: "/weights/qwen3"
    ignore_patterns:
      - "original/*"
      - "*.pth"
docker_server:
  start_command: sh -c "python3 -m sglang.launch_server --model-path /weights/qwen3 --host 0.0.0.0 --port 8000 --served-model-name Qwen/Qwen3-32B --tp 1 --reasoning-parser qwen3"
  readiness_endpoint: /health
  liveness_endpoint: /health
  predict_endpoint: /v1/chat/completions
  server_port: 8000
resources:
  accelerator: H100:1
  use_gpu: true
runtime:
  predict_concurrency: 32
